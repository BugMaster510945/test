name: Build and publish Docker image

on:
  push:
  # Variante release only (decommenter pour publier uniquement sur release):
  # push: null
  # release:
  #   types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    # GitHub-hosted runners support ubuntu/windows/macos.
    # For Debian specifically, use a self-hosted runner labeled for Debian.
    # Variante Debian self-hosted:
    # runs-on: [self-hosted, linux, debian]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: prep
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create release asset with image digest
        if: ${{ github.event_name == 'release' }}
        run: |
          {
            echo "Image: ${{ steps.prep.outputs.image }}"
            echo "Tag: ${{ github.ref_name }}"
            echo "Digest: ${{ steps.build.outputs.digest }}"
            echo "Pull (immutable): docker pull ${{ steps.prep.outputs.image }}@${{ steps.build.outputs.digest }}"
          } > ghcr-image.txt

      - name: Attach Docker image reference to release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ghcr-image.txt